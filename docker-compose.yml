services:
  db:
    image: postgres:16-alpine
    container_name: biblioteca-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biblioteca_dev
    ports:
      - "5432:5432"
    volumes:
      - biblioteca-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biblioteca_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: biblioteca-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: biblioteca_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: docker-secret-troque-em-producao
      JWT_EXPIRES_IN: 8h
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: biblioteca-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  biblioteca-db-data:
